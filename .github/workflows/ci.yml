name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "numpy>=1.24,<3" "pandas>=2.0,<3" "requests>=2.31,<3"
          python -m pip install pytest ruff mypy

      - name: Ruff (materials)
        run: ruff check vtsimnx/materials

      - name: MyPy (materials csv loader)
        run: mypy --ignore-missing-imports --follow-imports=skip vtsimnx/materials/__init__.py

      - name: Unit tests + minimal run_calc contract test
        run: python -m pytest -q vtsimnx/tests/test_utils_io.py vtsimnx/tests/test_run_calc_lazy.py
